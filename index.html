<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Xem Phim Online</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="logo">🎬 Xem Phim</a>
      <nav class="nav">
        <a href="index.html">Trang chủ</a>
        <a href="categories.html">Thể loại</a>
        <a href="search.html">Tìm kiếm</a>
        <a href="about.html">Giới thiệu</a>
        <a href="contact.html">Liên hệ</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section class="toolbar">
      <input id="searchInput" type="search" placeholder="Tìm phim theo tên, mô tả..." />
      <div class="view-toggle" role="group" aria-label="Chế độ hiển thị">
        <button id="gridBtn" class="active" aria-pressed="true">Grid</button>
        <button id="listBtn" aria-pressed="false">List</button>
      </div>
    </section>

    <section id="movies" class="movie-grid" aria-live="polite"></section>
    <div class="pagination">
      <button id="loadMoreBtn">Xem thêm</button>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2025 Xem Phim Online • Lưu ý: Video phát từ Google Drive công khai</p>
    </div>
  </footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/main.js"></script>
</body>
<!--
  Trang chủ: Hiển thị danh sách phim từ data/movies.json với grid/list view,
  tìm kiếm cơ bản và nút "Xem thêm".
-->
</html>

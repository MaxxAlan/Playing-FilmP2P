<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Movie JSON Editor</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .github-config {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      width: min(1100px, 92%);
      margin: 18px auto;
    }

    .github-config h2 {
      margin: 0 0 16px;
      font-size: 18px;
    }

    .github-config .input-group {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .github-config input {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f1217;
      color: var(--text);
    }

    .github-status {
      font-size: 14px;
      color: var(--muted);
      margin-top: 8px;
    }

    .wrap {
      width: min(1100px, 92%);
      margin: 18px auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    input,
    textarea,
    select {
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0f1217;
      color: var(--text);
    }

    textarea {
      min-height: 120px;
    }

    .list {
      display: grid;
      gap: 8px;
      max-height: 520px;
      overflow: auto;
    }

    .row {
      display: grid;
      grid-template-columns: 56px 1fr 80px;
      gap: 8px;
      align-items: center;
    }

    .poster-mini {
      width: 56px;
      height: 84px;
      object-fit: cover;
      border-radius: 8px;
      background: #0e1116;
    }

    .button-row {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .flex-gap {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }
  </style>
</head>

<body>
  <section class="github-config">
    <h2>GitHub Configuration</h2>
    <div class="input-group">
      <input id="githubToken" type="password" placeholder="GitHub Token" />
      <input id="githubRepo" placeholder="Username/Repository" />
      <input id="githubBranch" placeholder="Branch (mặc định: main)" value="main" />
    </div>
    <button class="btn primary" id="commitToGithub">Commit to GitHub</button>
    <div id="githubStatus" class="github-status"></div>
  </section>
  <main class="wrap">
    <section class="panel">
      <h2>Nhập thông tin phim</h2>
      <div class="grid">
        <input id="title" placeholder="Tên phim" />
        <input id="year" type="number" placeholder="Năm phát hành" />
        <input id="poster" placeholder="URL poster" />
        <input id="driveId" placeholder="driveId" />
        <div class="button-row">
        </div>
        <input id="genre" placeholder="genre (Action, Comedy, ...)" />
        <div class="flex-gap">
          <button class="btn primary" id="add">Thêm vào list</button>
          <button class="btn" id="download">Tải JSON</button>
        </div>
    </section>
    <section class="panel">
      <h2>Danh sách</h2>
      <div id="list" class="list"></div>
    </section>
  </main>
  <script src="assets/js/utils.js"></script>
  <script src="assets/js/movie-editor.js"></script>
</body>

</html>
